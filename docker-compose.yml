services:
  mysql:
    image: mysql:8.0
    container_name: card_wallet_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: card_wallet_db
      MYSQL_USER: card_wallet_user
      MYSQL_PASSWORD: card_wallet_password
    ports:
      - "3001:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: card_wallet_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
